<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>th1nk - debat multi-agent</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="shell">
      <div class="hero">
        <div class="hero-left">
          <p class="eyebrow">localhost multi-agent</p>
          <h1>th1nk</h1>
          <p class="subtitle">
            Des IA generatives debattent en colonnes, les arbitres synthetisent en dessous.
          </p>
        </div>
        <div class="hero-controls">
          <div class="slider-group">
            <label>Tours avant arbitrage</label>
            <input type="range" id="roundsSlider" min="1" max="10" value="3" step="1">
            <span class="value" id="roundsValue">3</span>
          </div>
          <div class="slider-group">
            <label>Cycles d'arbitrage</label>
            <input type="range" id="arbitrationsSlider" min="1" max="10" value="2" step="1">
            <span class="value" id="arbitrationsValue">2</span>
          </div>
        </div>
      </div>

      <section class="workspace" aria-label="Debat">
        <div>
          <div class="section-heading">
            <h2>Slaves</h2>
            <div class="inline-counter" id="slaveCounterWidget">
              <button type="button" id="slaveMinusBtn" aria-label="Retirer une IA slave">-</button>
              <span id="slaveCountDisplay">3</span>
              <button type="button" id="slavePlusBtn" aria-label="Ajouter une IA slave">+</button>
            </div>
          </div>
          <div id="slavePanels" class="slave-row"></div>
        </div>

        <div>
          <div class="section-heading">
            <h2>Arbitres</h2>
            <div class="inline-counter" id="arbiterCounterWidget">
              <button type="button" id="arbiterMinusBtn" aria-label="Retirer un arbitre">-</button>
              <span id="arbiterCountDisplay">1</span>
              <button type="button" id="arbiterPlusBtn" aria-label="Ajouter un arbitre">+</button>
            </div>
          </div>
          <div id="arbiterPanels" class="arbiter-stack"></div>
        </div>
      </section>

      <footer class="prompt-bar">
        <label for="requestInput">Question a debattre</label>
        <div class="prompt-row">
          <textarea id="requestInput" rows="2" placeholder="Exemple : Faut-il reguler l'intelligence artificielle ?"></textarea>
          <button id="startButton" class="start-button" type="button">Lancer</button>
        </div>
      </footer>
    </main>

    <div class="agent-editor" id="agentEditor" hidden>
      <div class="agent-editor__backdrop" data-close-agent-editor></div>
      <div class="agent-editor__dialog" role="dialog" aria-modal="true" aria-labelledby="agentEditorTitle">
        <form id="agentEditorForm">
          <div class="agent-editor__header">
            <p class="eyebrow">Modifier le profil</p>
            <h3 id="agentEditorTitle">Agent</h3>
          </div>

          <label class="agent-editor__field">
            <span>Nom</span>
            <input id="agentEditorName" type="text" autocomplete="off" maxlength="80">
          </label>

          <label class="agent-editor__field">
            <span>Role</span>
            <textarea id="agentEditorPersona" rows="5" maxlength="400"></textarea>
          </label>

          <div class="agent-editor__actions">
            <button type="button" id="agentEditorCancel" class="agent-editor__secondary">Annuler</button>
            <button type="submit" class="agent-editor__primary">Enregistrer</button>
          </div>
        </form>
      </div>
    </div>

    <template id="panelTemplate">
      <article class="panel">
        <header>
          <div>
            <h3></h3>
            <p></p>
          </div>
          <button type="button" class="panel-badge" aria-label="Modifier le profil"></button>
        </header>
        <pre></pre>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
